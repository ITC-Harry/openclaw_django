{% extends 'base.html' %}
{% block title %}狀態管理{% endblock %}
{% block content %}
<div class="page-header">
    <h4><i class="bi bi-diagram-3-fill me-2"></i>狀態管理</h4>
    <a href="{% url 'pm_admin:status_create' %}" class="btn btn-primary btn-modern">
        <i class="bi bi-plus-lg me-1"></i> 新建狀態
    </a>
</div>
<div class="card-modern">
    <table class="table table-hover mb-0">
        <thead class="table-light">
            <tr>
                <th>名稱</th>
                <th>排序</th>
                <th>預設</th>
                <th>已關閉</th>
                <th>顏色</th>
                <th style="width:160px">操作</th>
            </tr>
        </thead>
        <tbody>
            {% for s in statuses %}
            <tr>
                <td class="fw-semibold">{{ s.name }}</td>
                <td>{{ s.order }}</td>
                <td>{% if s.is_default %}<i class="bi bi-check-circle-fill text-success"></i>{% endif %}</td>
                <td>{% if s.is_closed %}<i class="bi bi-check-circle-fill text-danger"></i>{% endif %}</td>
                <td><span class="badge" style="background:{{ s.color }}">{{ s.color }}</span></td>
                <td>
                    <a href="{% url 'pm_admin:status_edit' s.pk %}" class="btn btn-sm btn-outline-primary">
                        <i class="bi bi-pencil"></i>
                    </a>
                    <a href="{% url 'pm_admin:status_delete' s.pk %}" class="btn btn-sm btn-outline-danger">
                        <i class="bi bi-trash"></i>
                    </a>
                </td>
            </tr>
            {% empty %}
            <tr><td colspan="6" class="text-center text-muted py-4">尚無狀態</td></tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
