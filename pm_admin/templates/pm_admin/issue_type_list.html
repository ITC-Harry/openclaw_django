{% extends 'base.html' %}
{% block title %}議題類型管理{% endblock %}
{% block content %}
<div class="page-header">
    <h4><i class="bi bi-tags-fill me-2"></i>議題類型管理</h4>
    <a href="{% url 'pm_admin:issue_type_create' %}" class="btn btn-primary btn-modern">
        <i class="bi bi-plus-lg me-1"></i> 新建類型
    </a>
</div>
<div class="card-modern">
    <table class="table table-hover mb-0">
        <thead class="table-light">
            <tr>
                <th>名稱</th>
                <th>圖標</th>
                <th>顏色</th>
                <th style="width:160px">操作</th>
            </tr>
        </thead>
        <tbody>
            {% for t in types %}
            <tr>
                <td class="fw-semibold">{{ t.name }}</td>
                <td><i class="bi {{ t.icon }}"></i> {{ t.icon }}</td>
                <td><span class="badge" style="background:{{ t.color }}">{{ t.color }}</span></td>
                <td>
                    <a href="{% url 'pm_admin:issue_type_edit' t.pk %}" class="btn btn-sm btn-outline-primary">
                        <i class="bi bi-pencil"></i>
                    </a>
                    <a href="{% url 'pm_admin:issue_type_delete' t.pk %}" class="btn btn-sm btn-outline-danger">
                        <i class="bi bi-trash"></i>
                    </a>
                </td>
            </tr>
            {% empty %}
            <tr><td colspan="4" class="text-center text-muted py-4">尚無議題類型</td></tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
