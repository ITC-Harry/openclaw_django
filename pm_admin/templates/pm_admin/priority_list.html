{% extends 'base.html' %}
{% block title %}優先級管理{% endblock %}
{% block content %}
<div class="page-header">
    <h4><i class="bi bi-flag-fill me-2"></i>優先級管理</h4>
    <a href="{% url 'pm_admin:priority_create' %}" class="btn btn-primary btn-modern">
        <i class="bi bi-plus-lg me-1"></i> 新建優先級
    </a>
</div>
<div class="card-modern">
    <table class="table table-hover mb-0">
        <thead class="table-light">
            <tr>
                <th>名稱</th>
                <th>級別</th>
                <th>顏色</th>
                <th style="width:160px">操作</th>
            </tr>
        </thead>
        <tbody>
            {% for p in priorities %}
            <tr>
                <td class="fw-semibold">{{ p.name }}</td>
                <td>{{ p.level }}</td>
                <td><span class="badge" style="background:{{ p.color }}">{{ p.color }}</span></td>
                <td>
                    <a href="{% url 'pm_admin:priority_edit' p.pk %}" class="btn btn-sm btn-outline-primary">
                        <i class="bi bi-pencil"></i>
                    </a>
                    <a href="{% url 'pm_admin:priority_delete' p.pk %}" class="btn btn-sm btn-outline-danger">
                        <i class="bi bi-trash"></i>
                    </a>
                </td>
            </tr>
            {% empty %}
            <tr><td colspan="4" class="text-center text-muted py-4">尚無優先級</td></tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
