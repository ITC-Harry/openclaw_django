{% extends 'base.html' %}
{% block title %}刪除議題 - {{ project.key }}{% endblock %}
{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-lg-6">
        <div class="card-modern border border-danger">
            <div class="card-body text-center p-5">
                <div style="font-size: 4rem; color: #dc3545;">
                    <i class="bi bi-exclamation-triangle-fill"></i>
                </div>
                <h4 class="mt-3 fw-bold">確認刪除</h4>
                <p class="text-muted mb-1">確定要刪除議題</p>
                <h5 class="fw-bold mb-3">
                    <span class="badge bg-dark me-2">{{ project.key }}-{{ issue.id }}</span>
                    {{ issue.summary|truncatechars:50 }}
                </h5>
                <p class="text-danger small"><i class="bi bi-info-circle me-1"></i>此操作不可回復！</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex gap-2 justify-content-center mt-4">
                        <button type="submit" class="btn btn-danger btn-modern px-4">
                            <i class="bi bi-trash me-1"></i> 確認刪除
                        </button>
                        <a href="{% url 'issues:detail' project.pk issue.pk %}" class="btn btn-light btn-modern px-4">取消</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
