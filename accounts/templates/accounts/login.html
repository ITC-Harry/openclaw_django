{% extends 'base.html' %}
{% block title %}登入 - PM System{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-logo">
            <i class="bi bi-kanban"></i>
            <h3>PM System</h3>
            <p class="text-muted">專案管理系統</p>
        </div>
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
            <div class="mb-3">
                <label class="form-label fw-semibold small">{{ field.label }}</label>
                <div class="input-group">
                    <span class="input-group-text bg-light">
                        <i class="bi bi-{% if 'username' in field.name %}person{% else %}lock{% endif %}"></i>
                    </span>
                    {{ field }}
                </div>
                {% if field.errors %}
                <div class="text-danger small mt-1">{{ field.errors|join:', ' }}</div>
                {% endif %}
            </div>
            {% endfor %}
            <button type="submit" class="btn btn-primary w-100 btn-modern py-2">登入</button>
        </form>
        <div class="text-center mt-4">
            <small class="text-muted">還沒有帳號？</small>
            <a href="{% url 'accounts:register' %}" class="fw-semibold">註冊</a>
        </div>
    </div>
</div>
{% endblock %}
