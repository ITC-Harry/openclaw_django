{% extends 'base.html' %}
{% block title %}個人設定 - PM System{% endblock %}
{% block content %}
<div class="page-header">
    <h4><i class="bi bi-gear-fill me-2"></i>個人設定</h4>
</div>

<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card-modern">
            <div class="card-body">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label fw-semibold small">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}
                        <div class="text-danger small mt-1">{{ field.errors|join:', ' }}</div>
                        {% endif %}
                    </div>
                    {% endfor %}
                    <div class="mt-4 d-flex gap-2">
                        <button type="submit" class="btn btn-primary btn-modern">
                            <i class="bi bi-check-lg me-1"></i> 儲存
                        </button>
                        <a href="{% url 'projects:list' %}" class="btn btn-light btn-modern">取消</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
